<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>REDHIPPO</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
background: #000;
}

body {
background: #000;
color: #ff2200;
font-family: ‘Courier New’, Courier, monospace;
font-size: 16px;
min-height: 100vh;
padding: 16px;
}

.wrap {
max-width: 800px;
margin: 0 auto;
}

/* HEADER */
.hdr {
border: 2px solid #ff2200;
padding: 20px;
margin-bottom: 16px;
text-align: center;
}

.hdr h1 {
font-size: clamp(28px, 8vw, 52px);
font-weight: bold;
letter-spacing: 0.2em;
color: #ff2200;
line-height: 1;
}

.hdr p {
font-size: clamp(11px, 3vw, 16px);
color: #880000;
letter-spacing: 0.3em;
margin-top: 6px;
}

.hdr hr {
border: none;
border-top: 1px solid #440000;
margin: 12px 0;
}

.hdr .meta {
font-size: clamp(10px, 2.5vw, 13px);
color: #550000;
letter-spacing: 0.15em;
}

/* STATUS */
.status {
background: #000;
border: 1px solid #440000;
border-bottom: none;
padding: 6px 12px;
font-size: clamp(10px, 2.5vw, 13px);
color: #550000;
letter-spacing: 0.1em;
display: flex;
justify-content: space-between;
align-items: center;
gap: 8px;
flex-wrap: wrap;
}

.dot {
display: inline-block;
width: 7px; height: 7px;
background: #ff2200;
border-radius: 50%;
margin-right: 5px;
animation: bl 1.2s step-end infinite;
vertical-align: middle;
}

button {
background: #000;
border: 1px solid #440000;
color: #880000;
font-family: ‘Courier New’, monospace;
font-size: clamp(10px, 2.5vw, 13px);
letter-spacing: 0.1em;
padding: 4px 10px;
cursor: pointer;
}

button:hover, button:active {
background: #ff2200;
color: #000;
}

/* LIST */
ul {
list-style: none;
border: 1px solid #440000;
}

li {
border-bottom: 1px solid #220000;
}

li:last-child { border-bottom: none; }

a {
display: grid;
grid-template-columns: 30px 1fr 20px;
align-items: center;
gap: 10px;
padding: 10px 12px;
text-decoration: none;
color: #cc1100;
background: #000;
font-family: ‘Courier New’, monospace;
}

a:hover, a:active {
background: #ff2200;
color: #000;
}

a:hover .desc, a:active .desc { color: #000; }
a:hover .num, a:active .num { color: #000; }
a:hover .arr, a:active .arr { color: #000; }

.num {
font-size: 11px;
color: #440000;
text-align: right;
}

.info {
display: flex;
flex-direction: column;
min-width: 0;
}

.name {
font-size: clamp(15px, 4vw, 20px);
font-weight: bold;
letter-spacing: 0.06em;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.desc {
font-size: clamp(10px, 2.5vw, 13px);
color: #880000;
letter-spacing: 0.02em;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.arr {
font-size: 16px;
color: #440000;
text-align: right;
}

/* FOOTER */
footer {
border: 1px solid #220000;
border-top: 1px solid #440000;
margin-top: 16px;
padding: 10px;
text-align: center;
font-size: clamp(9px, 2vw, 12px);
color: #440000;
letter-spacing: 0.15em;
}

/* MSG */
.msg {
border: 1px solid #440000;
padding: 30px;
text-align: center;
font-size: clamp(13px, 3vw, 18px);
color: #660000;
letter-spacing: 0.15em;
}

@keyframes bl { 50% { opacity: 0; } }
</style>

</head>
<body>
<div class="wrap">

  <div class="hdr">
    <h1>// REDHIPPO //</h1>
    <p>INSOMNIA VIBE CODER</p>
    <hr>
    <p class="meta">LIVE GITHUB DASHBOARD &nbsp;·&nbsp; <span id="blink" style="animation:bl 1s step-end infinite;display:inline-block">■</span></p>
  </div>

  <div class="status">
    <span><span class="dot"></span>api.github.com · redhippogit</span>
    <span id="cnt">LÄDT...</span>
    <button onclick="load()">↺ RELOAD</button>
  </div>

  <div id="out">
    <div class="msg">VERBINDE MIT GITHUB...</div>
  </div>

  <footer>REDHIPPO · BUILT AT 3AM · GITHUB LIVE · <span id="ts">–</span></footer>

</div>
<script>
var USER  = 'redhippogit';
var BASE  = 'https://redhippogit.github.io/';

var REPOS = [
{name:‘Testsnob’,     d:‘Playground & Sandbox — Ideen-Labor’},
{name:‘Steel’,        d:‘Hartes Projekt — built tough’},
{name:‘SNOB’,         d:‘Premium UI — nur das Beste’},
{name:‘Ferien’,       d:‘Ferienplaner — Freizeit digital’},
{name:‘Leagal’,       d:‘Legal-Seite — Impressum & Datenschutz’},
{name:‘Ferienpass’,   d:‘Aktivitäten & Angebote für Kids’},
{name:‘CI’,           d:‘Corporate Identity — Brand-Kit’},
{name:‘sober’,        d:‘Clean & minimal — kein Bullshit’},
{name:‘jensjob’,      d:‘Job-Profil — wer Jens ist’},
{name:‘Vanjens’,      d:‘Van-Life Seite — on the road’},
{name:‘Fam’,          d:‘Familien-Seite — für die die zählen’},
{name:‘Familea’,      d:‘Familien-Community — Service & Infos’},
{name:‘helvetiaholt’, d:‘Swiss-Roots — lokal & bodenständig’}
];

function render(list) {
var now = new Date();
document.getElementById(‘ts’).textContent =
now.toLocaleTimeString(‘de-CH’,{hour:‘2-digit’,minute:‘2-digit’});

var ul = document.createElement(‘ul’);

for (var i = 0; i < list.length; i++) {
var r  = list[i];
var li = document.createElement(‘li’);
var a  = document.createElement(‘a’);
a.href   = BASE + r.name + ‘/’;
a.target = ‘_blank’;
a.rel    = ‘noopener noreferrer’;

```
var desc = r.description || r.d || '–';
var updated = r.updated_at ? ago(new Date(r.updated_at)) : '';

a.innerHTML =
  '<span class="num">' + String(i+1).padStart(2,'0') + '</span>' +
  '<span class="info">' +
    '<span class="name">' + r.name.toUpperCase() + '</span>' +
    '<span class="desc">' + desc + (updated ? ' · ' + updated : '') + '</span>' +
  '</span>' +
  '<span class="arr">&raquo;</span>';

li.appendChild(a);
ul.appendChild(li);
```

}

document.getElementById(‘out’).innerHTML = ‘’;
document.getElementById(‘out’).appendChild(ul);
}

function load() {
document.getElementById(‘out’).innerHTML = ‘<div class="msg">LÄDT…</div>’;
document.getElementById(‘cnt’).textContent = ‘LÄDT…’;

var xhr = new XMLHttpRequest();
xhr.open(‘GET’, ‘https://api.github.com/users/’ + USER + ‘/repos?sort=updated&per_page=100’, true);
xhr.setRequestHeader(‘Accept’, ‘application/vnd.github+json’);
xhr.timeout = 8000;

xhr.onload = function() {
if (xhr.status === 200) {
try {
var data = JSON.parse(xhr.responseText);
document.getElementById(‘cnt’).textContent = data.length + ’ REPOS · LIVE’;
render(data);
} catch(e) {
fallback();
}
} else {
fallback();
}
};

xhr.onerror   = fallback;
xhr.ontimeout = fallback;
xhr.send();
}

function fallback() {
document.getElementById(‘cnt’).textContent = REPOS.length + ’ REPOS · CACHED’;
render(REPOS);
}

function ago(d) {
var s = Math.floor((new Date() - d) / 1000);
if (s < 60)      return ‘GERADE’;
if (s < 3600)    return ‘VOR ’ + Math.floor(s/60) + ’ MIN’;
if (s < 86400)   return ‘VOR ’ + Math.floor(s/3600) + ’ STD’;
if (s < 604800)  return ‘VOR ’ + Math.floor(s/86400) + ’ TAGEN’;
return ‘VOR ’ + Math.floor(s/604800) + ’ WOCHEN’;
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
